version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      # Defina um valor forte e secreto. Substitua antes de ir para prod!
      - COOKIE_SECRET=${COOKIE_SECRET:-changeme-replace-in-production}
      # URL do frontend para restringir o CORS
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:8080" # Mapeando a 8080 (interna do Nginx) para a 5173 externa
    depends_on:
      - backend
    restart: unless-stopped
