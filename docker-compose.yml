version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:8080" # Mapeando a 8080 (interna do Nginx) para a 5173 externa
    depends_on:
      - backend
    restart: unless-stopped
